---
# 文件名建议：NAT-厂商简称-机房-配置.yaml
# 示例：NAT-炎火云-镇江-2H2G3M.yaml
# 服务器：厂商 - 机房 - 配置
# 最后更新: YYYY-MM-DD
# 只给自己看，密码明文存放

# 厂家基本信息（快速续费/开端口/查工单用）
provider: 厂商名称
website: https://xxxx.com/
login_username: your@email.com 或 手机号
login_password: xxxxxxxxxx

# 服务器基本信息
location: 机房城市
config: 2核 2GB 内存 XMbps NAT
os: Debian-12.0_x64 / Ubuntu-22.04 / CentOS-7 等
cpu: Intel(R) Xeon(R) Gold xxxx CPU @ x.xxGHz   # 可选，运行 lscpu 可查
shared_public_ip: xxx.xxx.xxx.xxx

# 付费信息
billing:
  cycle: 月付 / 年付 / 一次性
  price: XX元/月 或 XX元/年
  start_date: YYYY-MM-DD
  expire_date: YYYY-MM-DD
  note: 简短评价，例如：超低价镇江 NAT，性价比极高

# SSH 登录
ssh:
  login_address: xxx.xxx.xxx.xxx:端口号
  username: root / ubuntu / 自定义
  password: xxxxxxxxxx
  note: 外网端口 XXXXX → 内网 22

# 宝塔面板（或 aaPanel / 1Panel 等）
bt_panel:
  url: http(s)://xxx.xxx.xxx.xxx:端口/安全码
  username: admin / noahwei / 自定义
  password: xxxxxxxxxx
  note: 安全入口备用端口 XXXXX

# Oracle 数据库（如果没有可以删除整个 oracle_db 块）
oracle_db:
  connection_address: xxx.xxx.xxx.xxx:外网端口
  sid_service_name: orcl / xe / 自定义
  username: scott / system / 自定义
  password: xxxxxxxxxx
  sqlplus_example: sqlplus 用户名/密码@//IP:端口/sid @G:\路径\脚本.sql
  plsqldeveloper_target: IP:端口/sid
  note: 外网端口 XXXXXX → 内网 1521

# 其他备注（可选扩展，随时加内容）
other_notes:
  - 所有服务均依赖 NAT 端口映射，端口调整需在厂商后台或工单操作
  - 建议每月检查一次端口连通性和密码安全性
  - 常用命令/脚本备份位置：G:\Oracle_SQL\
  - 当前主要用途：Oracle 测试 / 中转 / 个人项目 / 下载 等

tags: [NAT, 机房城市, 配置简称, 低价, Oracle, 中转 等]  # 用逗号分隔，方便搜索